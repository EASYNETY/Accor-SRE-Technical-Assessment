apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redemption-api-networkpolicy
spec:
  podSelector:
    matchLabels:
      app: redemption-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: alb-ingress-controller
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 443
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 53
