name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Static analysis — no AWS credentials required
  # ──────────────────────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run terraform fmt check
        run: |
          cd infra/terraform
          terraform fmt -check

      - name: Lint Helm chart
        run: |
          helm lint helm/redemption

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Build & push — requires AWS credentials to be configured
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: static-analysis
    # Skip this job gracefully if AWS credentials are not configured
    if: ${{ secrets.AWS_IAM_ROLE != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/redemption:latest
            ${{ secrets.ECR_REGISTRY }}/redemption:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: '${{ secrets.ECR_REGISTRY }}/redemption:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
